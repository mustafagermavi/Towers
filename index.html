<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PIXEL TOWER | SYSTEM-01</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div class="pixel-hud">
            <div class="score-card">
                <div class="p-label">FLOOR</div>
                <div id="floor-count">0</div>
            </div>
            <div class="score-card">
                <div class="p-label">MULTI</div>
                <div id="multi-text">1.0x</div>
            </div>
        </div>

        <div id="stage">
            <div id="crane">
                <div class="p-block" id="active-block"></div>
            </div>
            <div id="stack-container">
                <div class="p-base">CORE-BASE</div>
            </div>
        </div>

        <div class="pixel-dash">
            <button id="action-btn" class="pixel-btn">EXECUTE DROP</button>
        </div>

        <div id="game-over-screen" class="hidden">
            <div class="pixel-modal">
                <h1 class="blink-text">SYSTEM HALTED</h1>
                <div class="final-stats">
                    <p>RECORDS SAVED</p>
                    <p>FLOORS: <span id="final-floor">0</span></p>
                </div>
                <button onclick="location.reload()" class="retry-btn">REBOOT SYSTEM</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
