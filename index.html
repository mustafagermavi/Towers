<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower Stack Ultra 3D - Full Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #ffd700; }
        body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* ڕووکاری بەکارهێنەر (UI) */
        #ui {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; pointer-events: none; z-index: 100;
        }

        #bg-score {
            font-family: 'Montserrat', sans-serif;
            font-size: 250px; color: white; opacity: 0.03;
            position: absolute; margin: 0; z-index: -1;
        }

        #current-score {
            font-size: 60px; font-weight: 900; color: white;
            margin-top: -350px; text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #message {
            color: var(--accent); font-weight: bold; font-size: 20px;
            letter-spacing: 5px; opacity: 0; transform: translateY(20px);
            transition: 0.3s ease;
        }

        #start-screen {
            position: absolute; inset: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 200;
            color: white; cursor: pointer;
        }

        .btn-start {
            padding: 15px 40px; border: 2px solid white; background: transparent;
            color: white; font-size: 20px; font-weight: bold; border-radius: 50px;
            margin-top: 20px; transition: 0.3s;
        }

        #sound-btn {
            position: absolute; bottom: 30px; right: 30px;
            pointer-events: auto; cursor: pointer; font-size: 24px;
            background: rgba(255,255,255,0.1); padding: 10px;
            border-radius: 50%; width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center; z-index: 300;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="font-size: 48px; margin: 0;">TOWER <span style="color:var(--accent)">STACK</span></h1>
        <p style="opacity: 0.7;">بۆ دەستپێکردن کلیک بکە</p>
        <button class="btn-start">START GAME</button>
    </div>

    <div id="ui">
        <h1 id="bg-score">0</h1>
        <div id="current-score">0</div>
        <div id="message">PERFECT!</div>
    </div>

    <div id="sound-btn">🔊</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>

    <script>
        // --- سیستەمی دەنگ ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let isMuted = false;
        
        function playPopSound(pitch) {
            if (isMuted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(220 + (pitch * 40), audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        // --- مۆتۆڕی یاری سێ ڕەهەندی ---
        let scene, camera, renderer, activeBlock;
        let blocks = [];
        let score = 0;
        let isPlaying = false;
        const boxHeight = 1;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 10, 30);

            const aspect = window.innerWidth / window.innerHeight;
            const d = 8;
            camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
            camera.position.set(10, 10, 10);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
            dirLight.position.set(5, 10, 7);
            dirLight.castShadow = true;
            scene.add(dirLight);

            createBase();
            animate();
        }

        function createBase() {
            const geo = new THREE.BoxGeometry(4, boxHeight, 4);
            const mat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.receiveShadow = true;
            scene.add(mesh);
            blocks.push({ mesh, width: 4, depth: 4 });
        }

        function spawnBlock() {
            const last = blocks[blocks.length - 1];
            const hue = (score * 20) % 360;
            const color = new THREE.Color(`hsl(${hue}, 65%, 55%)`);
            
            const geo = new THREE.BoxGeometry(last.width, boxHeight, last.depth);
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.4 });
            activeBlock = new THREE.Mesh(geo, mat);
            activeBlock.castShadow = true;
            activeBlock.receiveShadow = true;
            
            activeBlock.position.set(-8, blocks.length * boxHeight, last.mesh.position.z);
            scene.add(activeBlock);

            gsap.to(activeBlock.position, {
                x: 8,
                duration: Math.max(0.7, 2 - score * 0.04),
                repeat: -1, yoyo: true,
                ease: "sine.inOut"
            });
        }

        function handleAction() {
            if (!isPlaying) {
                isPlaying = true;
                audioCtx.resume();
                gsap.to(document.getElementById('start-screen'), { opacity: 0, duration: 0.5, onComplete: () => {
                    document.getElementById('start-screen').style.display = 'none';
                    spawnBlock();
                }});
                return;
            }

            const last = blocks[blocks.length - 1];
            gsap.killTweensOf(activeBlock.position);

            const diff = activeBlock.position.x - last.mesh.position.x;
            const threshold = 0.2;

            if (Math.abs(diff) < last.width) {
                let finalX = activeBlock.position.x;
                let newWidth = last.width - Math.abs(diff);

                if (Math.abs(diff) < threshold) {
                    finalX = last.mesh.position.x;
                    newWidth = last.width;
                    showFeedback("PERFECT!");
                    playPopSound(score % 12 + 5);
                }

                const color = activeBlock.material.color;
                scene.remove(activeBlock);
                
                const geo = new THREE.BoxGeometry(newWidth, boxHeight, last.depth);
                const mat = new THREE.MeshStandardMaterial({ color: color });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(finalX, blocks.length * boxHeight, last.mesh.position.z);
                mesh.castShadow = true; mesh.receiveShadow = true;
                scene.add(mesh);
                
                blocks.push({ mesh, width: newWidth, depth: last.depth });
                score++;
                updateScore();
                playPopSound(score % 12);

                gsap.to(camera.position, { y: blocks.length + 10, duration: 1.2, ease: "power2.out" });
                spawnBlock();
            } else {
                gameOver();
            }
        }

        function updateScore() {
            document.getElementById('bg-score').innerText = score;
            document.getElementById('current-score').innerText = score;
        }

        function showFeedback(txt) {
            const msg = document.getElementById('message');
            msg.innerText = txt;
            gsap.to(msg, { opacity: 1, y: 0, duration: 0.2 });
            gsap.to(msg, { opacity: 0, y: -20, delay: 0.5, duration: 0.3 });
            gsap.to(camera.position, { x: 10.3, duration: 0.05, repeat: 3, yoyo: true });
        }

        function gameOver() {
            isPlaying = false;
            gsap.to(camera.position, { z: 20, x: 20, duration: 2, ease: "power2.inOut" });
            setTimeout(() => location.reload(), 1500);
        }

        function animate() {
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        // --- ڕووداوەکان ---
        window.addEventListener('mousedown', handleAction);
        window.addEventListener('touchstart', (e) => { e.preventDefault(); handleAction(); });
        document.getElementById('sound-btn').onclick = (e) => {
            e.stopPropagation();
            isMuted = !isMuted;
            document.getElementById('sound-btn').innerText = isMuted ? '🔇' : '🔊';
        };

        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            const d = 8;
            camera.left = -d * aspect; camera.right = d * aspect;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
