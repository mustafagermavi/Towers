<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER-X | PRO CHICKEN ROAD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div class="crt-overlay"></div>

        <header class="system-hud">
            <div class="stat-group">
                <span class="label">CURRENT MULTI</span>
                <span id="multi-text" class="value cyan-glow">1.00x</span>
            </div>
            <div class="stat-group">
                <span class="label">NEXT REWARD</span>
                <span id="next-win" class="value gold-glow">1.25x</span>
            </div>
        </header>

        <main id="viewport">
            <div id="road-stage">
                <div class="grid-lines"></div>
                <div id="player" class="chicken-icon"></div>
            </div>
        </main>

        <footer class="control-deck">
            <div class="lane-tracker">LANE: <span id="lane-count">0</span> / 20</div>
            <div class="action-grid">
                <button id="step-btn" class="btn-primary">CROSS NEXT LANE</button>
                <button id="cash-btn" class="btn-secondary" disabled>CASH OUT</button>
            </div>
        </footer>

        <div id="overlay" class="hidden">
            <div class="modal-box">
                <h1 id="modal-status" class="blink">SYSTEM BUSTED</h1>
                <div class="data-results">
                    <p>TOTAL WIN: <span id="res-multi">0.00x</span></p>
                    <p>DISTANCE: <span id="res-lane">0</span> LANES</p>
                </div>
                <button onclick="location.reload()" class="btn-reboot">REBOOT SYSTEM</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
