<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOWER RUSH PIXEL - DEMO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="header">
            <div class="multiplier" id="multi">x1.00</div>
            <div class="balance">DEMO MODE</div>
        </div>

        <div class="game-area">
            <div class="crane" id="crane">
                <div class="rope"></div>
                <div class="block active-block"></div>
            </div>
            
            <div id="tower-container">
                <div class="base">BASE</div>
            </div>
        </div>

        <div class="ui-panel">
            <div class="bet-controls">
                <button class="small-btn">MIN</button>
                <div class="amount-box">0.10 TON</div>
                <button class="small-btn">MAX</button>
            </div>
            <button id="build-btn" class="hazard-button">BUILD</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
